<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoKilo | My Pickups</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
    <script src="./js/auth-guard.js?v=2"></script>
    <script src="./js/api.js"></script>

    <style>
        .pickup-list-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .pickup-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-clr);
            padding: 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .pickup-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .pickup-details {
            flex-grow: 1;
        }

        .pickup-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 8px;
        }

        .pickup-id {
            font-family: monospace;
            color: var(--text-muted);
            font-size: 0.9rem;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .pickup-meta {
            display: flex;
            gap: 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pickup-financials {
            display: flex;
            gap: 15px;
            background: #f8fafc;
            padding: 10px 15px;
            border-radius: var(--radius-md);
            display: inline-flex;
        }

        .fin-item {
            font-weight: 600;
        }

        .fin-item.money {
            color: var(--clr-green);
        }

        .fin-item.points {
            color: var(--clr-saffron);
        }

        .pickup-status-container {
            text-align: right;
            min-width: 150px;
        }

        .nav-links a.active {
            color: var(--clr-green);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="ph-fill ph-leaf brand-icon"></i>
                <span>Eco<span>Kilo</span></span>
            </div>
            <div class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="pickups.html" class="active">Pickups</a>
                <a href="rewards.html">Rewards</a>
                <a href="leaderboard.html">Leaderboard</a>
            </div>
            <div class="nav-profile">
                <div class="wallet-badge" title="Wallet Balance">
                    <i class="ph ph-wallet"></i>
                    <span id="navWalletBalance">₹ -.--</span>
                </div>
                <div class="profile-circle" title="View Profile">
                    <a href="profile.html">
                        <img id="navProfileImage"
                            src="https://ui-avatars.com/api/?name=User&background=138808&color=fff" alt="User Profile">
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pickup-list-container">
        <header style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>My Pickups 🚛</h1>
                <p style="color: var(--text-muted);">View your past and upcoming waste collections.</p>
            </div>
            <a href="index.html" class="btn-primary" style="text-decoration: none;">+ Schedule New</a>
        </header>

        <div id="pickupsList">
            <!-- Loading State -->
            <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                <i class="ph ph-spinner ph-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                <p>Loading your pickup history...</p>
            </div>
        </div>
    </main>

    <script src="./js/pickups.js"></script>
</body>

</html>

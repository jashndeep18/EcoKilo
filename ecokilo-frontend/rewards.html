<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoKilo | Rewards Station</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
    <script src="./js/auth-guard.js?v=2"></script>
    <script src="./js/api.js"></script>

    <style>
        .reward-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .reward-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-clr);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .reward-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
        }

        .reward-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reward-img img {
            max-width: 60%;
            max-height: 60%;
        }

        .reward-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .reward-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .reward-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .reward-points {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--clr-saffron);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .points-balance-card {
            background: linear-gradient(135deg, var(--clr-saffron), #ffb84d);
            color: white;
            padding: 30px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .points-balance-card h2 {
            font-size: 3rem;
            margin-bottom: 5px;
        }

        .nav-links a.active {
            color: var(--clr-green);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="ph-fill ph-leaf brand-icon"></i>
                <span>Eco<span>Kilo</span></span>
            </div>
            <div class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="pickups.html">Pickups</a>
                <a href="rewards.html" class="active">Rewards</a>
                <a href="leaderboard.html">Leaderboard</a>
            </div>
            <div class="nav-profile">
                <div class="wallet-badge" title="Wallet Balance">
                    <i class="ph ph-wallet"></i>
                    <span id="navWalletBalance">₹ -.--</span>
                </div>
                <div class="profile-circle" title="View Profile">
                    <a href="profile.html">
                        <img id="navProfileImage"
                            src="https://ui-avatars.com/api/?name=User&background=138808&color=fff" alt="User Profile">
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="welcome-header">
            <div class="welcome-text">
                <h1 id="welcomeHeading">Rewards Station 🎁</h1>
                <p>Redeem your hard-earned Eco Points for exciting physical and digital rewards!</p>
            </div>
        </header>

        <section class="points-balance-card">
            <div>
                <p style="opacity: 0.9; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;">Your Points
                    Balance</p>
                <h2 id="heroPointsBalance">-- <span style="font-size: 1.2rem; font-weight: 500;">pts</span></h2>
            </div>
            <i class="ph-fill ph-star" style="font-size: 5rem; opacity: 0.3;"></i>
        </section>

        <section class="rewards-catalog">
            <div class="section-header">
                <h2>Available Rewards</h2>
            </div>

            <div class="reward-grid" id="rewardsGrid">
                <!-- Injected via JS -->
                <p style="color: var(--text-muted); padding: 10px;">Loading catalog...</p>
            </div>
        </section>
    </main>

    <script src="./js/rewards.js"></script>
</body>

</html>

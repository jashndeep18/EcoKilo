<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoKilo | Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
    <script src="./js/auth-guard.js?v=2"></script>
    <script src="./js/api.js"></script>

    <style>
        .leaderboard-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            height: 250px;
        }

        .podium-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 140px;
            position: relative;
        }

        .podium-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: -40px;
            z-index: 2;
            background: white;
        }

        .podium-base {
            width: 100%;
            background: linear-gradient(to bottom, #f1f5f9, #e2e8f0);
            border-radius: 8px 8px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.05);
        }

        .podium-step.rank-1 .podium-base {
            height: 160px;
            background: linear-gradient(to bottom, #FFD700, #FDB931);
            color: #6b4c0a;
        }

        .podium-step.rank-2 .podium-base {
            height: 120px;
            background: linear-gradient(to bottom, #E0E0E0, #BDBDBD);
            color: #424242;
        }

        .podium-step.rank-3 .podium-base {
            height: 90px;
            background: linear-gradient(to bottom, #CD7F32, #A0522D);
            color: #ffffff;
        }

        .podium-step.rank-1 .podium-avatar {
            border-color: #FFD700;
            width: 100px;
            height: 100px;
            margin-bottom: -50px;
        }

        .podium-step.rank-2 .podium-avatar {
            border-color: #E0E0E0;
        }

        .podium-step.rank-3 .podium-avatar {
            border-color: #CD7F32;
        }

        .podium-name {
            font-weight: 700;
            margin-bottom: 4px;
            text-align: center;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 90%;
        }

        .podium-pts {
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.9;
        }

        .rank-number {
            font-size: 3rem;
            font-weight: 800;
            opacity: 0.2;
            position: absolute;
            bottom: -10px;
        }

        .list-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-clr);
            overflow: hidden;
        }

        .list-row {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-clr);
            transition: background 0.2s ease;
        }

        .list-row:last-child {
            border-bottom: none;
        }

        .list-row:hover {
            background: #f8fafc;
        }

        .list-rank {
            width: 40px;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .list-user {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .list-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .list-name {
            font-weight: 600;
            color: var(--text-main);
        }

        .list-pts {
            font-weight: 700;
            color: var(--clr-saffron);
            font-size: 1.1rem;
        }

        .nav-links a.active {
            color: var(--clr-green);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="ph-fill ph-leaf brand-icon"></i>
                <span>Eco<span>Kilo</span></span>
            </div>
            <div class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="pickups.html">Pickups</a>
                <a href="rewards.html">Rewards</a>
                <a href="leaderboard.html" class="active">Leaderboard</a>
            </div>
            <div class="nav-profile">
                <div class="wallet-badge" title="Wallet Balance">
                    <i class="ph ph-wallet"></i>
                    <span id="navWalletBalance">₹ -.--</span>
                </div>
                <div class="profile-circle" title="View Profile">
                    <a href="profile.html">
                        <img id="navProfileImage"
                            src="https://ui-avatars.com/api/?name=User&background=138808&color=fff" alt="User Profile">
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="leaderboard-container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1>Top Eco-Warriors 🏆</h1>
            <p style="color: var(--text-muted);">See who is making the biggest impact this month.</p>
        </header>

        <div id="leaderboardContent">
            <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                <i class="ph ph-spinner ph-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                <p>Loading rankings...</p>
            </div>
        </div>
    </main>

    <script src="./js/leaderboard.js"></script>
</body>

</html>
